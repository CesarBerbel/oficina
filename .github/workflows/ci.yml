name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Validate, build and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oficina
          POSTGRES_PASSWORD: oficina_test_pwd
          POSTGRES_DB: oficina_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U oficina -d oficina_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://oficina:oficina_test_pwd@localhost:5434/oficina_test?schema=public
      NODE_ENV: test
      APP_NAME: Oficina CI
      API_GLOBAL_PREFIX: api
      WEB_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: oficina-ci-access-secret-with-more-than-16-chars
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_SECRET: oficina-ci-refresh-secret-with-more-than-16-chars
      JWT_REFRESH_TTL: 7d
      AUTH_COOKIE_NAME: oficina_ci_rt
      AUTH_COOKIE_SECURE: 'false'
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RATE_LIMIT_TTL: '60'
      RATE_LIMIT_MAX: '1000'
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /tmp/oficina-ci-uploads
      MAIL_DRIVER: log
      SMTP_HOST: ''
      SMTP_PORT: '465'
      SMTP_SECURE: 'true'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: ''
      VAPID_PUBLIC_KEY: ''
      VAPID_PRIVATE_KEY: ''
      VAPID_SUBJECT: mailto:ci@oficina.local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply test database migrations
        run: pnpm prisma:deploy

      - name: Build shared package
        run: pnpm --filter @oficina/shared build

      - name: Typecheck API
        run: pnpm --filter @oficina/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @oficina/web typecheck

      - name: Build all packages
        run: pnpm build

      - name: Run API unit tests
        run: pnpm --filter @oficina/api test

      - name: Run API E2E tests
        run: pnpm --filter @oficina/api test:e2e
