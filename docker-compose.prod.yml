# Produção: PostgreSQL + API (NestJS) + Web (Next.js) + Nginx (reverse proxy).
# Build: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - oficina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      API_PORT: 3333
      API_GLOBAL_PREFIX: api
      WEB_ORIGIN: ${WEB_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      STORAGE_LOCAL_DIR: /app/apps/api/uploads
    volumes:
      - oficina_uploads:/app/apps/api/uploads
    expose:
      - '3333'
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://127.0.0.1:3333/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        # URL pública (browser) — via Nginx, mesma origem.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_TENANT_SLUG: ${NEXT_PUBLIC_SITE_TENANT_SLUG:-}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # URL interna usada no SSR (server components) dentro da rede do compose.
      API_INTERNAL_URL: http://api:3333/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_TENANT_SLUG: ${NEXT_PUBLIC_SITE_TENANT_SLUG:-}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '127.0.0.1:18081:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  oficina_pgdata:
  oficina_uploads:
