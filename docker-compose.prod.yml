# Produção: PostgreSQL + API (NestJS) + Web (Next.js) + Nginx (reverse proxy).
# Build: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - oficina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      API_PORT: 3333
      API_GLOBAL_PREFIX: api
      WEB_ORIGIN: ${WEB_ORIGIN}
      # Base pública confiável para URLs absolutas (uploads). Vazio = URL relativa.
      APP_URL: ${APP_URL:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Segredo dedicado dos tokens da garagem (obrigatório em produção).
      GARAGE_JWT_SECRET: ${GARAGE_JWT_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      # SaaS multi-conta: domínio-base da plataforma (apex = login do super admin)
      # e auto-verificação dos subdomínios próprios. Sem isso, host→conta não resolve.
      PLATFORM_BASE_DOMAIN: ${PLATFORM_BASE_DOMAIN:-}
      PLATFORM_ACCOUNT_SLUG: ${PLATFORM_ACCOUNT_SLUG:-plataforma}
      TENANT_DOMAIN_AUTO_VERIFY_SUFFIXES: ${TENANT_DOMAIN_AUTO_VERIFY_SUFFIXES:-}
      # Enums booleanas: default precisa ser válido ('true'|'false'), nunca vazio
      # — em produção o NODE_ENV=production já força o modo estrito de qualquer jeito.
      TENANT_DOMAIN_REQUIRE_VERIFIED: ${TENANT_DOMAIN_REQUIRE_VERIFIED:-false}
      PUBLIC_STRICT_HOST: ${PUBLIC_STRICT_HOST:-false}
      PUBLIC_TRACKING_TOKEN_TTL_DAYS: ${PUBLIC_TRACKING_TOKEN_TTL_DAYS:-90}
      # Alertas ativos / monitor.
      ALERT_MONITOR_ENABLED: ${ALERT_MONITOR_ENABLED:-true}
      ALERT_RENOTIFY_HOURS: ${ALERT_RENOTIFY_HOURS:-24}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-26}
      OUTBOX_STUCK_AGE_SEC: ${OUTBOX_STUCK_AGE_SEC:-600}
      # Rate limiting (global e de login).
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-5}
      STORAGE_LOCAL_DIR: /app/apps/api/uploads
      # E-mail (SMTP). MAIL_DRIVER=log apenas simula no log do container.
      MAIL_DRIVER: ${MAIL_DRIVER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Web push (VAPID) — opcional.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@oficina.local}
    volumes:
      - oficina_uploads:/app/apps/api/uploads
    expose:
      - '3333'
    healthcheck:
      # Imagem distroless não tem shell: usa CMD (exec) + caminho absoluto do node.
      test: ['CMD', '/nodejs/bin/node', '-e', "fetch('http://127.0.0.1:3333/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        # URL pública (browser) — via Nginx, mesma origem.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_TENANT_SLUG: ${NEXT_PUBLIC_SITE_TENANT_SLUG:-}
        # Chave pública VAPID (Web Push) — embutida no bundle do browser.
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # URL interna usada no SSR (server components) dentro da rede do compose.
      API_INTERNAL_URL: http://api:3333/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_TENANT_SLUG: ${NEXT_PUBLIC_SITE_TENANT_SLUG:-}
    expose:
      - '3000'
    healthcheck:
      # Imagem distroless não tem shell: usa CMD (exec) + caminho absoluto do node.
      test: ['CMD', '/nodejs/bin/node', '-e', "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '127.0.0.1:18081:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  # Nomes fixos (independentes do COMPOSE_PROJECT_NAME) para que backup/restore
  # encontrem sempre os mesmos volumes.
  oficina_pgdata:
    name: oficina_pgdata
  oficina_uploads:
    name: oficina_uploads
