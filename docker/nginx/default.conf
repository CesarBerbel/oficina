upstream oficina_api {
    server api:3333;
}

upstream oficina_web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Healthcheck do Nginx (usado pelo docker-compose).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API (NestJS)
    location /api/ {
        proxy_pass http://oficina_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sobrescreve qualquer X-Forwarded-Host enviado pelo cliente (anti-spoof).
        proxy_set_header X-Forwarded-Host $host;
    }

    # Uploads locais servidos pela API (imagens, assinaturas, logos etc.).
    location /uploads/ {
        proxy_pass http://oficina_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sobrescreve qualquer X-Forwarded-Host enviado pelo cliente (anti-spoof).
        proxy_set_header X-Forwarded-Host $host;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://oficina_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sobrescreve qualquer X-Forwarded-Host enviado pelo cliente (anti-spoof).
        proxy_set_header X-Forwarded-Host $host;
    }
}
